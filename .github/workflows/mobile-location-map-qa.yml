name: Mobile location and map QA

on:
  push:
    branches: [main]
    paths:
      - 'src/components/mobile-app-v2.tsx'
      - 'src/mobile-app-v2.css'
      - 'src/components/layout.tsx'
      - 'src/main.tsx'
      - 'tests/mobile-location-map.spec.ts'
      - '.github/workflows/mobile-location-map-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-location-map-qa
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
      VITE_GOOGLE_MAPS_MAP_ID: ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm exec vite build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mobile flow tests
        run: npx playwright test tests/mobile-location-map.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-location-map-playwright-report
          path: output/playwright/
          if-no-files-found: ignore
